<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CorpSeat | ניהול חברה</title>
    <!-- We generate a cache-busting string by appending a dynamic query to the css link, but since we have no JS, we just rename or force refresh. -->
    <link rel="stylesheet" href="/static/style.css?v=2">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="brand">🚀 CorpSeat</div>
            <nav class="nav-links">
                <a href="/ui/offices">🏢 תמונת מצב - משרדים</a>
                <a href="/ui/employees">👥 פורטל השמת עובדים</a>
                <a href="/ui/assign">🔗 פקודת שיוך מרוכזת</a>
            </nav>
        </aside>
        <div class="main-content">
            <header class="topbar">
                <h2>מערכת אדמיניסטרציה רשמית</h2>
            </header>
            <main class="container">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
</body>
</html>
