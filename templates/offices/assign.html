{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h1>חלון שיוך עובדים מרוכז</h1>
    
    <form method="POST" action="/ui/assign">
        <div class="form-group">
            <label>שם המשרד</label>
            <select name="office_id" class="form-control" required style="font-weight:bold;">
                <option value="">-- בחר/י משרד מהרשימה --</option>
                {% for o in offices %}
                <option value="{{ o.id }}">קומה {{ o.floor }} חדר {{ o.room_number }} (תפוסה כעת: {{ o.employee_count }}/{{ o.capacity }})</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label>בחר עובדים להעברה:</label>
            <div style="max-height: 350px; overflow-y: auto; border: 1px solid var(--border); padding: 1rem; border-radius: 6px; background:var(--bg);">
                {% for e in employees %}
                <div style="margin-bottom: 0.5rem; padding: 0.5rem; border-bottom: 1px solid var(--border);">
                    <input type="checkbox" name="employee_ids" value="{{ e.id }}" id="emp_{{ e.id }}" style="transform: scale(1.2); margin-left: 0.5rem;">
                    <label for="emp_{{ e.id }}" style="display:inline; font-weight:normal; cursor:pointer;">
                        <strong>{{ e.name }}</strong> (מחלקה: {{ e.department }}) 
                        <span style="color:var(--text-muted); margin-right:1rem;">
                        | משרד נוכחי: {% if e.office_id %}ק' {{ e.office_floor }} חד' {{ e.office_room_number }}{% else %}ללא במערכת{% endif %}
                        </span>
                    </label>
                </div>
                {% endfor %}
            </div>
        </div>
        
        <button type="submit" class="btn" style="margin-top: 1rem; padding: 0.75rem 2rem;">שייך עובדים למשרד</button>
    </form>
</div>
{% endblock %}
