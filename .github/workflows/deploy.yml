name: CorpSeat CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  # ----------------------------------------------------
  # עבודה 1: בנייה ודחיפה - ללא תגית Latest!
  # ----------------------------------------------------
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image (SHA only)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # שים לב! מחקנו מכאן את ה-latest. רק גרסה ספציפית עולה כרגע.
          tags: |
            inonbm/corpseat:${{ github.sha }}

  # ----------------------------------------------------
  # עבודה 2: פריסה, טסט, רולבאק וקידום תגיות
  # ----------------------------------------------------
  deploy-and-test:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH into EC2, Deploy, Test and Rollback
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            NEW_VERSION="${{ github.sha }}"

            # 1. מושכים את הגרסה הספציפית
            docker pull inonbm/corpseat:$NEW_VERSION

            # 2. שומרים על הקיים: משנים את השם של הקופסה הישנה במקום למחוק אותה!
            docker rename corpseat-app corpseat-app-old || true
            docker stop corpseat-app-old || true

            # 3. מריצים את הגרסה החדשה
            docker run -d -p 5000:5000 --name corpseat-app inonbm/corpseat:$NEW_VERSION

            # 4. טסט מקומי: בגלל שהסקריפט רץ בתוך השרת, אפשר לבדוק ישירות מול localhost
            echo "Waiting 5 seconds for Flask to boot..."
            sleep 5

            # לוגיקת הרולבאק: אם עובד - מוחקים גיבוי. אם נופל - מוחזיר גיבוי.
            if curl --fail http://localhost:5000; then
              echo "✅ Test Passed! New version is healthy."
              docker rm corpseat-app-old || true
            else
              echo "❌ Test Failed! Initiating Rollback..."
              docker stop corpseat-app || true
              docker rm corpseat-app || true
              docker rename corpseat-app-old corpseat-app
              docker start corpseat-app
              echo "🔄 Rollback complete. The previous stable version is back online."
              exit 1 # פקודה חשובה - אומרת לגיטהאב שהשלב הזה נכשל
            fi

      - name: Promote to Latest in Docker Hub
        # השלב הזה קריטי: הוא ירוץ *אך ורק* אם סקריפט ה-SSH (והטסט בתוכו) הסתיים בהצלחה (ללא exit 1)
        run: |
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          docker pull inonbm/corpseat:${{ github.sha }}
          docker tag inonbm/corpseat:${{ github.sha }} inonbm/corpseat:latest
          docker push inonbm/corpseat:latest
