name: CorpSeat CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image (SHA only)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            inonbm/corpseat:${{ github.sha }}

  deploy-and-test:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      # חובה לעשות צ'קאאוט גם פה כדי שהרובוט יוכל לקחת את הקבצים מהפרויקט
      - name: Checkout Code
        uses: actions/checkout@v4

      # העתקת קובץ הקומפוז ותיקיית Nginx לשרת של אמזון
      - name: Copy Compose and Nginx config to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,nginx/"
          target: "~/corpseat-deploy"

      - name: SSH, Deploy with Compose, Test and Rollback
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/corpseat-deploy
            NEW_VERSION="${{ github.sha }}"
            
            # 1. מציאת הגרסה שעובדת כרגע באוויר (לפני שדורסים אותה)
            # אם הקונטיינר לא קיים, נשתמש ב-latest כברירת מחדל
            PREV_VERSION=$(docker inspect --format '{{.Config.Image}}' corpseat_web 2>/dev/null | cut -d ':' -f 2 || echo "latest")
            
            # 2. כתיבת הגרסה החדשה לקובץ סביבה כדי שקומפוז יקרא אותה
            echo "APP_VERSION=$NEW_VERSION" > .env
            
            # 3. משיכה והרצה של התזמורת המלאה (פליסק + אנג'ינקס)
            docker compose pull
            docker compose up -d
            
            echo "Waiting 5 seconds for systems to boot..."
            sleep 5
            
            # 4. בדיקת בריאות מול השומר שלנו (Nginx בפורט 80)
            if curl --fail http://localhost; then
              echo "✅ Test Passed! Nginx is serving Flask perfectly."
            else
              echo "❌ Test Failed! Rolling back to version $PREV_VERSION..."
              
              # משנים את משתנה הסביבה בחזרה לגרסה הישנה ומריצים שוב
              echo "APP_VERSION=$PREV_VERSION" > .env
              docker compose up -d
              
              echo "🔄 Rollback complete."
              exit 1
            fi

      - name: Promote to Latest in Docker Hub
        run: |
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          docker pull inonbm/corpseat:${{ github.sha }}
          docker tag inonbm/corpseat:${{ github.sha }} inonbm/corpseat:latest
          docker push inonbm/corpseat:latest
