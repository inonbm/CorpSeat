name: CorpSeat CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            inonbm/corpseat:latest
            inonbm/corpseat:${{ github.sha }}

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH into EC2 and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull inonbm/corpseat:latest
            docker stop corpseat-app || true
            docker rm corpseat-app || true
            docker run -d -p 5000:5000 --name corpseat-app inonbm/corpseat:latest
      - name: Health Check (Smoke Test)
        run: |
          echo "Waiting 10 seconds for Flask to boot..."
          sleep 10
          echo "Pinging the application..."
          curl --fail http://${{ secrets.EC2_HOST }}:5000
